<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<x-import component-from-global-scope="image-slot" from="./image-slot.js"></x-import>
<style>
body{margin:0;background:#FFFFFF;font-family:'Inter',sans-serif;color:#0E1A1A}
a{color:#2E9E9E;text-decoration:none}
a:hover{color:#176B6B;text-decoration:underline}
input::placeholder{color:#9db0b0}
input:focus{outline:2px solid #2E9E9E;outline-offset:1px}
</style>
</helmet>

<div style="min-height:100vh;display:grid;grid-template-columns:1fr 1fr">

<div style="display:flex;flex-direction:column;justify-content:center;padding:64px;max-width:520px;margin:0 auto;width:100%">
<a href="Home.dc.html" style="display:flex;align-items:center;gap:10px;margin-bottom:48px">
<span style="font-weight:700;font-size:19px;letter-spacing:-0.02em;color:#176B6B">DigiMed</span>
</a>

<h1 style="font-size:28px;font-weight:600;letter-spacing:-0.01em;margin:0 0 8px">Sign in</h1>
<p style="font-size:15px;color:#5A6B6B;margin:0 0 24px">Choose your role, then sign in to your dashboard.</p>

<div style="display:flex;gap:8px;margin-bottom:24px">
<button type="button" onclick="{{ selectManufacturer }}" style="{{ manufacturerBtnStyle }}">Manufacturer</button>
<button type="button" onclick="{{ selectRegulator }}" style="{{ regulatorBtnStyle }}">Regulator</button>
</div>

<sc-if value="{{ showHint }}" hint-placeholder-val="{{ true }}">
<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;background:#F4FAFA;border:1px solid #E2ECEC;border-radius:8px;padding:12px 14px;margin-bottom:24px">
<div style="font-size:13px;color:#5A6B6B">Demo credentials: <span style="font-family:'IBM Plex Mono',monospace;color:#176B6B">demo@digimedpass.io</span> / <span style="font-family:'IBM Plex Mono',monospace;color:#176B6B">demo1234</span> — works for either role</div>
<button onclick="{{ dismissHint }}" style="background:none;border:none;color:#5A6B6B;font-size:16px;cursor:pointer;line-height:1;padding:0">×</button>
</div>
</sc-if>

<form onsubmit="{{ handleSubmit }}" style="display:flex;flex-direction:column;gap:18px">
<div>
<label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px">Email</label>
<input type="email" value="{{ email }}" oninput="{{ setEmail }}" placeholder="you@company.com" style="width:100%;box-sizing:border-box;padding:12px 14px;border:1px solid #E2ECEC;border-radius:8px;font-size:15px;font-family:'Inter',sans-serif"/>
</div>
<div>
<label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px">Password</label>
<input type="password" value="{{ password }}" oninput="{{ setPassword }}" placeholder="••••••••" style="width:100%;box-sizing:border-box;padding:12px 14px;border:1px solid #E2ECEC;border-radius:8px;font-size:15px;font-family:'Inter',sans-serif"/>
</div>
<sc-if value="{{ hasError }}" hint-placeholder-val="{{ false }}">
<div style="font-size:13px;color:#B3352E;background:#fbeaea;border:1px solid #d98c86;border-radius:8px;padding:10px 14px">{{ errorMessage }}</div>
</sc-if>
<button type="submit" style="{{ submitStyle }}">{{ submitLabel }}</button>
</form>
<p style="font-size:14px;color:#5A6B6B;margin-top:24px">No account yet? <a href="Login.dc.html" style="font-weight:600">Sign up</a> (mocked — same demo credentials apply).</p>
</div>

<div style="position:relative;background:#0E1A1A;overflow:hidden;display:flex;align-items:center;justify-content:center">
<image-slot id="login-hero" shape="rect" placeholder="Drop a blockchain / node-lattice photo" style="position:absolute;inset:0;width:100%;height:100%"></image-slot>
<div style="position:absolute;inset:0;background:linear-gradient(160deg,rgba(14,26,26,.55),rgba(23,107,107,.35));pointer-events:none"></div>
<div style="position:relative;text-align:center;pointer-events:none">
<div style="font-weight:700;font-size:30px;color:#fff;letter-spacing:-0.02em;margin-bottom:6px;text-shadow:0 2px 12px rgba(0,0,0,.4)">DigiMed</div>
<div style="font-size:13px;color:#A8DDDD;margin-top:8px;text-shadow:0 2px 12px rgba(0,0,0,.4)">Regulatory evidence you can prove.</div>
</div>
</div>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { email: '', password: '', role: 'manufacturer', showHint: true, hasError: false, errorMessage: '', submitting: false };
  dashboardFor(role) { return role === 'regulator' ? 'RegulatorDashboard.dc.html' : 'Dashboard.dc.html'; }
  componentDidMount() {
    if (typeof localStorage !== 'undefined') {
      const raw = localStorage.getItem('digimedpass_session');
      if (raw) {
        try { const s = JSON.parse(raw); window.location.href = this.dashboardFor(s.role); }
        catch (e) { window.location.href = 'Dashboard.dc.html'; }
      }
    }
  }
  handleSubmit(e) {
    e.preventDefault();
    if (this.state.submitting) return;
    const { email, password, role } = this.state;
    if (!email || !password) {
      this.setState({ hasError: true, errorMessage: 'Enter both email and password.' });
      return;
    }
    this.setState({ submitting: true, hasError: false });
    setTimeout(() => {
      if (email === 'demo@digimedpass.io' && password === 'demo1234') {
        localStorage.setItem('digimedpass_session', JSON.stringify({ email, role, ts: Date.now() }));
        window.location.href = this.dashboardFor(role);
      } else {
        this.setState({ submitting: false, hasError: true, errorMessage: 'Invalid credentials. Try the demo login above.' });
      }
    }, 500);
  }
  renderVals() {
    const { email, password, role, showHint, hasError, errorMessage, submitting } = this.state;
    const roleBtn = (active) => `flex:1;font-size:14px;font-weight:600;padding:10px 16px;border-radius:8px;cursor:pointer;border:1.5px solid ${active ? '#2E9E9E' : '#E2ECEC'};background:${active ? '#eaf6f6' : '#fff'};color:${active ? '#176B6B' : '#5A6B6B'};`;
    return {
      email, password, showHint, hasError, errorMessage,
      manufacturerBtnStyle: roleBtn(role === 'manufacturer'),
      regulatorBtnStyle: roleBtn(role === 'regulator'),
      selectManufacturer: () => this.setState({ role: 'manufacturer' }),
      selectRegulator: () => this.setState({ role: 'regulator' }),
      setEmail: (e) => this.setState({ email: e.target.value }),
      setPassword: (e) => this.setState({ password: e.target.value }),
      dismissHint: () => this.setState({ showHint: false }),
      handleSubmit: (e) => this.handleSubmit(e),
      submitLabel: submitting ? 'Signing in…' : `Sign in as ${role === 'regulator' ? 'Regulator' : 'Manufacturer'}`,
      submitStyle: `background:${submitting ? '#7fc2c2' : '#2E9E9E'};color:#fff;font-weight:600;font-size:15px;padding:13px 20px;border:none;border-radius:8px;cursor:pointer;margin-top:6px;`
    };
  }
}

</script>
</body>
</html>
